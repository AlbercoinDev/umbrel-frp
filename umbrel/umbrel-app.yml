name: FRP Client
tagline: Túneles dinámicos FRP hacia tu VPS
icon: web/icon.svg
category: networking
version: "1.0.0"
description: >-
  FRP Client te permite exponer servicios de tu Umbrel en internet a través de
  un túnel FRP (Fast Reverse Proxy) hacia tu propio VPS con IP pública.


  A diferencia de soluciones como WireGuard, FRP es más ligero y no requiere
  una red virtual completa — cada túnel es un proxy TCP individual. Ideal para
  exponer servicios específicos como Bitcoin P2P, Electrs, o cualquier app
  que funcione por TCP.


  ✦ Interfaz web limpia y oscura estilo Umbrel

  ✦ CRUD completo de proxies con validación de puertos

  ✦ Sincronización automática con el VPS vía HTTPS

  ✦ Escritura atómica de frpc.toml — sin corrupción de datos

  ✦ Encriptación forzada (transport.useEncryption) en cada túnel

  ✦ network_mode: host — sin bridges, ideal para servicios de red

  ✦ Contenedor único — frpc como subprocess, sin comunicación entre contenedores


  Requisitos:

  - Un VPS con Ubuntu/Debian y IP pública fija

  - Un dominio apuntando al VPS (con puertos 80/443 abiertos)

  - Tener instalado FRP Server (frps) y el agente VPS en el servidor


  Instalación rápida del servidor VPS:

  sudo bash vps/install.sh
